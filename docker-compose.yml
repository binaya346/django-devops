services:
  db:
    image: postgres:15-alpine
    container_name: django_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-django}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-django_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: django_web
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8010:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${POSTGRES_DB:-django_db}
      - DB_USER=${POSTGRES_USER:-django}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-supersecretpassword}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data:
